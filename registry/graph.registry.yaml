registryRules:
  - Every graph contract must declare version, lifecycleState, owner, and license.
  - Node and edge type records must resolve to the canonical node-types or edge-types contract.
  - Constraint records must reference the graph node and edge contracts they validate.
  - Example graphs must validate against node, edge, constraint, and validation contracts before publication.
  - JSON-LD contexts must preserve stable term mappings across minor versions.
