version: 0.1.0
status: draft
namespace: odw.graph
owner: OpenDataWorld Contributors
license: Apache-2.0
purpose: Canonical registry of OpenDataWorld graph contracts, constraints, validation rules, semantic context, and reference examples.

records:
  - id: odw.graph.spec.readme.v1
    type: GraphSpecificationDocument
    name: OpenDataWorld Graph Specification README
    description: Documentation index for the OpenDataWorld graph package.
    path: graph/README.md
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.foundation.model.knowledgeGraph

  - id: odw.graph.nodeTypes.v1
    type: GraphNodeTypeContract
    name: Graph Node Types Contract
    description: Defines allowed node types, required fields, inheritance, and allowed edges.
    path: graph/node-types.yaml
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.foundation.model.knowledgeGraph
      - odw.foundation.model.namespace

  - id: odw.graph.edgeTypes.v1
    type: GraphEdgeTypeContract
    name: Graph Edge Types Contract
    description: Defines allowed edge types, source and target compatibility, cardinality, temporal behavior, provenance, evidence, and audit requirements.
    path: graph/edge-types.yaml
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.graph.nodeTypes.v1
      - odw.foundation.model.knowledgeGraph

  - id: odw.graph.constraints.v1
    type: GraphConstraintContract
    name: Graph Constraints Contract
    description: Defines hard graph validity constraints, lifecycle gates, publication gates, governance rules, trust rules, decision rules, and agent rules.
    path: graph/constraints.yaml
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.graph.nodeTypes.v1
      - odw.graph.edgeTypes.v1
      - odw.foundation.model.trust
      - odw.foundation.model.provenance
      - odw.foundation.model.lineage

  - id: odw.graph.validationRules.v1
    type: GraphValidationRuleContract
    name: Graph Validation Rules Contract
    description: Defines validation phases, checks, severity model, and validation report shape.
    path: graph/graph-validation-rules.yaml
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.graph.nodeTypes.v1
      - odw.graph.edgeTypes.v1
      - odw.graph.constraints.v1

  - id: odw.graph.example.healthDataset.v1
    type: GraphExample
    name: Example Health Dataset Graph
    description: Canonical example graph showing source-to-dataset-to-dashboard-to-insight-to-decision-to-outcome flow.
    path: graph/example-health-dataset.graph.json
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.graph.nodeTypes.v1
      - odw.graph.edgeTypes.v1
      - odw.graph.validationRules.v1
      - odw.schema.Dataset.v1
      - odw.schema.Decision.v1
      - odw.schema.Outcome.v1

  - id: odw.graph.context.opendataworld.v1
    type: JSONLDContext
    name: OpenDataWorld JSON-LD Context
    description: Semantic interoperability context mapping OpenDataWorld graph terms to JSON-LD, schema.org, DCAT, DCTerms, and PROV-O identifiers.
    path: contexts/opendataworld.context.jsonld
    contextId: https://opendataworld.org/foundation/contexts/opendataworld.context.jsonld
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.foundation.model.knowledgeGraph
      - odw.graph.nodeTypes.v1
      - odw.graph.edgeTypes.v1

