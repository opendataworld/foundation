  - id: odw.brand.policy.usage.v1
    type: BrandUsageRule
    name: OpenDataWorld Brand Usage Policy
    description: Policy record for acceptable use of OpenDataWorld names, logos, product names, solution names, taglines, and domains.
    lifecycleState: Draft
    version: 0.1.0
    expectedPath: TRADEMARKS.md

registryRules:
  - Every brand registry record must declare lifecycleState and version.
  - Product brand records should reference product registry records.
  - Solution brand records should reference solution registry records.
  - Brand names, logos, product names, solution names, taglines, and domains are governed by trademark and brand usage policy.
  - Open content or open source licenses do not grant trademark rights unless explicitly stated.
  - Community use should preserve attribution and avoid implying official endorsement without permission.
