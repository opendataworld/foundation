  - id: odw.solution.analyticsPortal.v1
    type: Solution
    name: Analytics Portal
    description: Solution package for metrics, KPIs, reports, dashboards, benchmarks, forecasts, insights, and governed analytical assets.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.analytics.v1
      - odw.product.insights.v1
      - odw.analytics.type.metric.v1
      - odw.analytics.type.insight.v1

  - id: odw.solution.decisionIntelligenceWorkspace.v1
    type: Solution
    name: Decision Intelligence Workspace
    description: Solution package for connecting data, trust, metrics, insights, evidence, assumptions, constraints, alternatives, decisions, actions, outcomes, value, learning, and improvement.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.decisionIntelligence.v1
      - odw.schema.Decision.v1
      - odw.schema.Outcome.v1
      - odw.foundation.model.decisionIntelligence

  - id: odw.solution.researchDataRepository.v1
    type: Solution
    name: Research Data Repository
    description: Solution package for registering, documenting, publishing, citing, governing, and reusing research datasets and related analytical artifacts.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.catalog.v1
      - odw.product.publishing.v1
      - odw.product.trust.v1
      - odw.product.lineage.v1

  - id: odw.solution.aiReadyDataFoundation.v1
    type: Solution
    name: AI-Ready Data Foundation
    description: Solution package for preparing governed, trusted, provenance-backed, lineage-aware, policy-bound data assets for AI and agentic workflows.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.registry.v1
      - odw.product.trust.v1
      - odw.product.lineage.v1
      - odw.product.agenticWorkflows.v1

  - id: odw.solution.agenticDataOperations.v1
    type: Solution
    name: Agentic Data Operations Platform
    description: Solution package for governed agents supporting discovery, metadata enrichment, classification, schema mapping, quality, lineage, analytics, insights, publishing, governance, and decision support.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.agenticWorkflows.v1
      - odw.agent.type.discovery.v1
      - odw.agent.type.governance.v1
      - odw.agent.type.decisionSupport.v1

registryRules:
  - Every solution record must declare lifecycleState and version.
  - Every solution should depend on one or more product records.
  - Solutions package capabilities for users and institutions; they must not redefine canonical foundation models.
  - Solution implementation details belong in solution or platform repositories, not the Foundation registry.
  - Domain-specific solutions may extend this registry under domain namespaces such as odw.solution.healthcare.*, odw.solution.education.*, or odw.solution.publicSector.*.
