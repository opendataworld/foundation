  - id: odw.solution.dataProductPlatform.v1
    type: Solution
    name: Data Product Platform
    description: Solution package for packaging governed datasets into reusable data products with consumers, interfaces, SLOs, quality expectations, access policy, and support model.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.registry.v1
      - odw.product.catalog.v1
