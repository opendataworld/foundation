version: 0.1.0
status: draft
namespace: odw.solution
owner: OpenDataWorld Contributors
license: Apache-2.0
purpose: Canonical registry index for OpenDataWorld solution packages that combine products, models, schemas, graph, governance, analytics, and agents into reusable real-world offerings.

records:
  - id: odw.solution.openDataPortal.v1
    type: Solution
    name: Open Data Portal
    description: Solution package for publishing, discovering, governing, and consuming open datasets and data products.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.catalog.v1
      - odw.product.publishing.v1
      - odw.product.governance.v1
      - odw.product.registry.v1

  - id: odw.solution.publicDataExchange.v1
    type: Solution
    name: Public Data Exchange
    description: Solution package for structured exchange of governed public data across institutions, publishers, developers, researchers, and consumers.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.registry.v1
      - odw.product.catalog.v1
      - odw.product.trust.v1
      - odw.product.lineage.v1

  - id: odw.solution.enterpriseDataMarketplace.v1
    type: Solution
    name: Enterprise Data Marketplace
    description: Solution package for internal and partner-facing governed data discovery, access, subscription, reuse, and accountability.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.catalog.v1
      - odw.product.governance.v1
      - odw.product.trust.v1
      - odw.product.decisionIntelligence.v1

  - id: odw.solution.datasetCatalog.v1
    type: Solution
    name: Dataset Catalog
    description: Solution package for registering, classifying, searching, and publishing datasets with ownership, stewardship, quality, provenance, and lineage context.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.catalog.v1
