      - odw.schema.DataProduct.v1

  - id: odw.solution.governanceWorkbench.v1
    type: Solution
    name: Governance Workbench
    description: Solution package for ownership, stewardship, classification, policy, approval, audit, exception, and publication readiness workflows.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.governance.v1
      - odw.governance.policy.publicationReadiness.v1
      - odw.governance.control.publishedDatasetCompleteness.v1

  - id: odw.solution.qualityTrustHub.v1
    type: Solution
    name: Quality and Trust Hub
    description: Solution package for quality profiles, trust assessments, evidence, known issues, review status, and trust monitoring.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.quality.v1
      - odw.product.trust.v1
      - odw.schema.TrustAssessment.v1

  - id: odw.solution.knowledgeGraphExplorer.v1
    type: Solution
    name: Knowledge Graph Explorer
    description: Solution package for exploring data, metadata, governance, trust, provenance, lineage, analytics, decisions, outcomes, and agents as a connected graph.
    lifecycleState: Draft
    version: 0.1.0
    dependsOn:
      - odw.product.knowledgeGraph.v1
      - odw.graph.nodeTypes.v1
