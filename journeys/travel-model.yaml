referenceTravelJourneys:
  - id: odw.travel.reference.personTrip.v1
    type: TravelJourney
    name: Person Trip Journey
    description: Generic journey for a person traveling from origin to destination.
    stages:
      - Purpose Defined
      - Origin Selected
      - Destination Selected
      - Route Planned
      - Eligibility Checked
      - Policy Evaluated
      - Approval Requested If Required
      - Reservation Created If Required
      - Travel Started
      - Boundary Crossed If Applicable
      - Destination Reached
      - Outcome Recorded

  - id: odw.travel.reference.dataMovement.v1
    type: TravelJourney
    name: Data Movement Journey
    description: Journey for data, dataset, file, message, credential, or digital asset moving between systems, regions, or jurisdictions.
    stages:
      - Source Identified
      - Destination Identified
      - Data Classification Checked
      - Jurisdiction Checked
      - Transfer Policy Evaluated
      - Approval Requested If Required
      - Transfer Executed
      - Receipt Confirmed
      - Lineage Recorded
      - Audit Recorded

  - id: odw.travel.reference.serviceAccess.v1
    type: TravelJourney
    name: Service Access Journey
    description: Journey for a user or agent moving through physical or digital locations to access a service.
    stages:
      - Need Identified
      - Nearest Service Located
      - Eligibility Checked
      - Route Or Access Path Selected
      - Arrival Or Connection Established
      - Service Delivered
      - Outcome Measured

travelRules:
  - Every governed travel record must have subject, origin, destination, lifecycleState, version, createdAt, and updatedAt.
  - Every travel segment must have origin, destination, mode, departure or start time, and arrival or end time where known.
  - Every jurisdiction-crossing travel event should preserve boundary, country, jurisdiction, eventTime, and recordedAt.
  - Travel requiring approval must preserve approval record, approver identity, policy reference, and approval time.
  - Travel involving data movement must preserve classification, source, destination, policy decision, lineage, and audit event.
  - Travel involving people may require eligibility, document, safety, budget, or consent context depending on policy.
  - Route and boundary data should preserve provenance and version where used for decisions.
  - Travel current state must be reproducible from travel events.

relationshipToPrimitives:
  identity: Travel subject, traveler, owner, operator, carrier, approver, and auditor must resolve to identities.
  time: Travel has planned, actual, event, departure, arrival, duration, delay, and completion times.
  location: Travel is movement across origins, destinations, stops, routes, boundaries, and jurisdictions.
  journey: Travel is a specialized journey with route and movement semantics.
  policy: Travel may require eligibility, approval, budget, document, jurisdiction, or transfer rules.
  graph: Travel connects subjects, locations, routes, events, policies, outcomes, and evidence.
  lineage: Data travel or asset movement must preserve lineage.
  audit: Governed travel must preserve event trace and audit context.
