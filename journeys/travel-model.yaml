version: 0.1.0
status: draft
namespace: odw.travel
owner: OpenDataWorld Contributors
license: Apache-2.0
purpose: Canonical travel model for governed movement across locations, time, identities, routes, jurisdictions, approvals, costs, risks, and outcomes.

coreIdea: >
  Travel is a specialized journey where a subject moves from one location to another over time through routes, stops, modes, jurisdictions, permissions, constraints, events, and outcomes.

travelPrinciples:
  - id: odw.travel.principle.journey
    name: Travel Is A Journey
    description: Travel is a governed path through locations, stages, events, states, and outcomes.

  - id: odw.travel.principle.spatiotemporal
    name: Travel Is Spatiotemporal
    description: Travel always has both time and location context.

  - id: odw.travel.principle.identityBound
    name: Travel Is Identity Bound
    description: Travel subject, traveler, carrier, operator, approver, and responsible party must resolve to identities where governed.

  - id: odw.travel.principle.jurisdictionAware
    name: Travel Is Jurisdiction Aware
    description: Travel may cross country, region, administrative, regulatory, or operating boundaries.

  - id: odw.travel.principle.policyBound
    name: Travel Is Policy Bound
    description: Travel may require eligibility checks, permissions, approvals, documents, budgets, safety checks, or compliance controls.

  - id: odw.travel.principle.observable
    name: Travel Is Observable
    description: Important travel events must preserve evidence, timestamps, route, status, and audit context.

travelPrimitives:
  - id: odw.travel.primitive.travelPlan
    name: Travel Plan
    description: Proposed or approved travel journey.

  - id: odw.travel.primitive.trip
    name: Trip
    description: Actual or planned end-to-end travel instance.

  - id: odw.travel.primitive.segment
    name: Segment
    description: One leg of travel between origin and destination.

  - id: odw.travel.primitive.route
    name: Route
    description: Ordered path across locations, stops, or waypoints.

  - id: odw.travel.primitive.stop
    name: Stop
    description: Intermediate location in a travel route.

  - id: odw.travel.primitive.origin
    name: Origin
    description: Starting location of a travel plan, trip, or segment.

  - id: odw.travel.primitive.destination
    name: Destination
    description: Ending location of a travel plan, trip, or segment.

  - id: odw.travel.primitive.mode
    name: Travel Mode
    description: Method of travel such as walking, road, rail, air, water, or digital transfer.

  - id: odw.travel.primitive.itinerary
    name: Itinerary
    description: Time-ordered travel plan including segments, stops, reservations, and constraints.

  - id: odw.travel.primitive.reservation
    name: Reservation
    description: Booking, ticket, permit, allocation, or confirmed travel entitlement.

  - id: odw.travel.primitive.travelEvent
    name: Travel Event
    description: Event that occurs during travel, such as departure, arrival, delay, cancellation, check-in, border crossing, or completion.

  - id: odw.travel.primitive.travelDocument
    name: Travel Document
    description: Document, credential, permit, ticket, pass, authorization, or evidence required for travel.

  - id: odw.travel.primitive.travelPolicy
    name: Travel Policy
    description: Policy governing eligibility, permission, budget, route, risk, approval, or compliance.

travelSubjectTypes:
  - Person
  - Organization
  - Team
  - Agent
  - Asset
  - DataAsset
  - Dataset
  - Shipment
  - Service
  - Vehicle
  - Device
  - Credential
  - Document

travelModes:
  - id: odw.travel.mode.walk
    name: Walk
    description: Human travel by walking.

  - id: odw.travel.mode.road
    name: Road
    description: Travel by road vehicle.

  - id: odw.travel.mode.rail
    name: Rail
    description: Travel by rail.

  - id: odw.travel.mode.air
    name: Air
    description: Travel by aircraft.

  - id: odw.travel.mode.water
    name: Water
    description: Travel by boat, ship, ferry, or other water transport.

  - id: odw.travel.mode.pipeline
    name: Pipeline
    description: Movement through pipeline-like infrastructure.

  - id: odw.travel.mode.digital
    name: Digital Transfer
    description: Movement of data, credential, content, or digital asset across digital locations or jurisdictions.

  - id: odw.travel.mode.multimodal
    name: Multimodal
    description: Travel using multiple modes.

