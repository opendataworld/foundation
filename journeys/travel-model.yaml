  - id: odw.travel.operator.between
    name: between
    description: Travel between two locations.

  - id: odw.travel.operator.nearest
    name: nearest
    description: Nearest reachable location or service.

  - id: odw.travel.operator.withinDistance
    name: withinDistance
    description: Travel or reachability within a distance.

  - id: odw.travel.operator.withinTime
    name: withinTime
