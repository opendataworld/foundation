  - id: odw.travel.event.completed
    name: Travel Completed
    description: Travel completed.

travelLifecycleStates:
  - Draft
  - Planned
  - SubmittedForApproval
  - Approved
  - Rejected
  - Scheduled
  - InProgress
  - Delayed
  - Completed
  - Cancelled
  - Archived

travelOperators:
  - id: odw.travel.operator.from
    name: from
    description: Starting location.

  - id: odw.travel.operator.to
    name: to
