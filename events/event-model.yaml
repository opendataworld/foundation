canonicalFields:
  event:
    - id
    - type
    - eventType
    - family
    - subject
    - subjectType
    - actor
    - action
    - effect
    - context
    - policyDecision
    - evidence
    - causationId
    - correlationId
    - traceId
    - eventTime
    - recordedAt
    - location
    - sourceSystem
    - lifecycleState
    - version
  effect:
    - affectedObject
    - affectedProperty
    - previousValue
    - newValue
    - stateTransition
    - relationshipChange
    - outputReference
  stream:
    - id
    - subject
    - streamType
    - events
    - orderingKey
    - createdAt
    - updatedAt

eventLifecycleStates:
  - Recorded
  - Verified
  - Superseded
  - Corrected
  - Revoked
  - Archived

eventRules:
  - Every event must have id, eventType, subject, eventTime, recordedAt, lifecycleState, and version.
  - Every governed event should have actor or sourceSystem.
  - Events that change state must preserve previous state, new state, actor, eventTime, and recordedAt.
  - Events that affect policy, trust, publication, access, decision, outcome, agent action, or audit must preserve evidence or reason.
  - Events should be append-only; corrections should be represented as corrective events, not destructive edits.
  - Events that are part of a journey, workflow, scan, computation, or transaction should preserve correlationId or traceId.
  - Event order should be reproducible using eventTime, recordedAt, and ordering key.
  - State current value should be reproducible from events, transitions, versions, or snapshots.
  - Event revocation must preserve revocation reason, revokedBy, and revokedAt where applicable.
  - Events crossing jurisdictional boundaries should preserve spatial context.

relationshipToFoundation:
  identity: Events identify actor, subject, recorder, approver, or system identities.
  time: Events are temporal primitives and must preserve eventTime and recordedAt.
  location: Events may occur at, inside, or across spatial scope and jurisdiction.
  relationship: Events assert, update, revoke, or verify relationships.
  state: Events cause or explain state transitions.
  journey: Journeys progress through events.
  scan: Scans produce observation and finding events.
  computation: Computations emit start, progress, retry, failure, and completion events.
  simulation: Simulations replay or generate hypothetical events that must remain marked as simulated.
  audit: Audit is a governed event stream.
  policy: Policies evaluate events and may trigger controls, approvals, or actions.
