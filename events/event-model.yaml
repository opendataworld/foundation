    description: A governed object was updated.

  - id: odw.event.type.stateChanged
    family: odw.event.family.state
    name: State Changed
    description: Subject transitioned from one state to another.

  - id: odw.event.type.relationshipAsserted
    family: odw.event.family.relationship
    name: Relationship Asserted
    description: A relationship was asserted between source and target.

  - id: odw.event.type.relationshipRevoked
    family: odw.event.family.relationship
    name: Relationship Revoked
    description: A relationship was revoked.

  - id: odw.event.type.policyEvaluated
    family: odw.event.family.policy
    name: Policy Evaluated
    description: A policy evaluation occurred.

  - id: odw.event.type.controlChecked
    family: odw.event.family.control
    name: Control Checked
    description: A control check occurred.

  - id: odw.event.type.approved
    family: odw.event.family.policy
    name: Approved
    description: Approval was granted.

  - id: odw.event.type.rejected
    family: odw.event.family.policy
    name: Rejected
    description: Approval or request was rejected.

  - id: odw.event.type.datasetRegistered
    family: odw.event.family.data
    name: Dataset Registered
    description: Dataset was registered.

  - id: odw.event.type.datasetPublished
    family: odw.event.family.data
    name: Dataset Published
    description: Dataset was published.

  - id: odw.event.type.trustAssessed
    family: odw.event.family.trust
    name: Trust Assessed
    description: Trust assessment was calculated or recorded.

  - id: odw.event.type.insightGenerated
    family: odw.event.family.analytics
    name: Insight Generated
    description: Insight was generated or recorded.

  - id: odw.event.type.decisionMade
    family: odw.event.family.analytics
    name: Decision Made
    description: Decision was made.

  - id: odw.event.type.outcomeMeasured
    family: odw.event.family.analytics
