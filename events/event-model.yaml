version: 0.1.0
status: draft
namespace: odw.event
owner: OpenDataWorld Contributors
license: Apache-2.0
purpose: Canonical event model for OpenDataWorld facts, changes, observations, actions, state transitions, audits, journeys, scans, computations, simulations, policies, and outcomes.

coreIdea: >
  An event is a recorded occurrence. Events explain what happened, who or what caused it, when it happened, where it happened, what changed, what evidence supports it, and how it affects state, relationships, journeys, decisions, and outcomes.

abstraction: |
  Event = Occurrence + Actor + Subject + Time + Context + Evidence + Effect

classification:
  primitive: true
  reason: >
    Event is a root primitive because state changes, journeys, audits, scans, computations, simulations, policies, and outcomes depend on recorded occurrences.

eventPrinciples:
  - id: odw.event.principle.appendOnly
    name: Append Only
    description: Events should be appended, not overwritten, so history remains replayable.

  - id: odw.event.principle.temporal
    name: Temporal
    description: Every event must preserve eventTime and recordedAt.

  - id: odw.event.principle.actorAware
    name: Actor Aware
    description: Governed events should identify the actor, system, service, or agent involved.

  - id: odw.event.principle.contextual
    name: Contextual
    description: Events should preserve relevant context such as policy, location, journey, scan, computation, or decision context.

  - id: odw.event.principle.replayable
    name: Replayable
    description: Important state projections should be reproducible from event history.

  - id: odw.event.principle.evidenceBacked
    name: Evidence Backed
    description: Events that affect governance, trust, decisions, outcomes, access, publication, or audit should reference evidence or provenance.

eventPrimitives:
  - id: odw.event.primitive.event
    name: Event
    description: Recorded occurrence.

  - id: odw.event.primitive.actor
    name: Actor
    description: Identity that caused, initiated, observed, or recorded the event.

  - id: odw.event.primitive.subject
    name: Subject
    description: Object, identity, dataset, policy, agent, journey, state, relationship, computation, or decision affected by the event.

  - id: odw.event.primitive.eventType
    name: Event Type
    description: Semantic type of occurrence.

  - id: odw.event.primitive.effect
    name: Effect
    description: Resulting change, observation, emission, or state impact caused by the event.

  - id: odw.event.primitive.causation
    name: Causation
    description: Relationship to the event or action that caused this event.

  - id: odw.event.primitive.correlation
    name: Correlation
    description: Relationship to other events in the same trace, journey, workflow, or transaction.

  - id: odw.event.primitive.eventStream
    name: Event Stream
    description: Ordered sequence of events for a subject, process, journey, or system.

eventFamilies:
  - id: odw.event.family.identity
    name: Identity Events
    description: Events involving identity creation, activation, suspension, delegation, credentialing, or revocation.

  - id: odw.event.family.state
    name: State Events
    description: Events that create, update, transition, revoke, or project state.

  - id: odw.event.family.relationship
    name: Relationship Events
    description: Events that assert, verify, update, revoke, or supersede relationships.

  - id: odw.event.family.data
    name: Data Events
    description: Events involving dataset registration, ingestion, validation, transformation, publication, archival, or revocation.

  - id: odw.event.family.policy
    name: Policy Events
    description: Events involving policy drafting, review, approval, activation, evaluation, exception, expiry, or retirement.

  - id: odw.event.family.control
    name: Control Events
    description: Events involving control checks, failures, exceptions, remediation, or approval gates.

  - id: odw.event.family.trust
    name: Trust Events
    description: Events involving trust assessment, review, certification, expiry, revocation, or reassessment.

  - id: odw.event.family.analytics
    name: Analytics Events
    description: Events involving metric creation, insight generation, decision making, outcome measurement, or value assessment.

  - id: odw.event.family.agent
    name: Agent Events
    description: Events involving agent planning, tool use, policy evaluation, approval, action, output, evaluation, or audit.

  - id: odw.event.family.scan
    name: Scan Events
    description: Events involving scan start, observation, finding, completion, failure, or review.

  - id: odw.event.family.computation
    name: Computation Events
    description: Events involving computation planning, execution, partition processing, output creation, failure, retry, or completion.

  - id: odw.event.family.audit
    name: Audit Events
    description: Events recorded for governance traceability and accountability.

