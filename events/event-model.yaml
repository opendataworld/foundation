    description: Outcome was measured.

  - id: odw.event.type.scanStarted
    family: odw.event.family.scan
    name: Scan Started
    description: Scan started.

  - id: odw.event.type.scanFindingRecorded
    family: odw.event.family.scan
    name: Scan Finding Recorded
    description: Scan finding was recorded.

  - id: odw.event.type.scanCompleted
    family: odw.event.family.scan
    name: Scan Completed
    description: Scan completed.

  - id: odw.event.type.agentActionExecuted
    family: odw.event.family.agent
    name: Agent Action Executed
    description: Agent action was executed.

  - id: odw.event.type.toolInvoked
    family: odw.event.family.agent
    name: Tool Invoked
    description: Tool was invoked by an agent, service, workflow, or user.

  - id: odw.event.type.computationStarted
    family: odw.event.family.computation
    name: Computation Started
    description: Computation job started.

  - id: odw.event.type.computationCompleted
    family: odw.event.family.computation
